<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>AI 互动调研与实时画像系统</title>
  <style>
    :root {
      --ink: #172033;
      --muted: #667085;
      --line: #dbe3ec;
      --brand: #0f766e;
      --brand-2: #2563eb;
      --soft: #f5f8fb;
      --danger: #b42318;
      --radius: 8px;
      --shadow: 0 22px 60px rgba(15, 23, 42, .14);
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      color: var(--ink);
      background:
        linear-gradient(180deg, rgba(15, 118, 110, .08), transparent 36%),
        #eef3f8;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    button, textarea { font: inherit; }
    button { cursor: pointer; }
    button:disabled { cursor: not-allowed; opacity: .55; }

    .app {
      min-height: 100%;
      display: grid;
      place-items: center;
      padding: env(safe-area-inset-top) 12px env(safe-area-inset-bottom);
    }

    .shell {
      width: min(100%, 430px);
      height: min(100vh, 860px);
      min-height: 620px;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      overflow: hidden;
      border: 1px solid rgba(219, 227, 236, .9);
      border-radius: 22px;
      background: #fff;
      box-shadow: var(--shadow);
    }

    .head {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 15px;
      border-bottom: 1px solid var(--line);
      background: rgba(255, 255, 255, .94);
      backdrop-filter: blur(12px);
    }

    .head > div:last-child { min-width: 0; }

    .mark {
      width: 42px;
      height: 42px;
      display: grid;
      place-items: center;
      flex: 0 0 auto;
      border-radius: 10px;
      color: #fff;
      font-weight: 900;
      background: linear-gradient(135deg, var(--brand), var(--brand-2));
    }

    .head strong {
      display: block;
      font-size: 17px;
      line-height: 1.18;
      overflow-wrap: anywhere;
    }

    .head span {
      display: block;
      margin-top: 3px;
      color: var(--muted);
      font-size: 12px;
    }

    .screen {
      min-height: 0;
      overflow: auto;
      background: var(--soft);
    }

    .welcome {
      min-height: 100%;
      display: grid;
      align-content: start;
      gap: 14px;
      padding: 18px 15px 24px;
    }

    .hero {
      color: #fff;
      padding: 22px 18px;
      border-radius: var(--radius);
      background: linear-gradient(135deg, rgba(15, 118, 110, .98), rgba(37, 99, 235, .94));
      box-shadow: 0 18px 42px rgba(15, 118, 110, .22);
    }

    .eyebrow {
      color: rgba(255, 255, 255, .78);
      font-size: 12px;
      font-weight: 900;
      letter-spacing: .04em;
      text-transform: uppercase;
    }

    .hero h1 {
      margin: 12px 0 8px;
      font-size: 34px;
      line-height: 1.06;
      letter-spacing: 0;
    }

    .hero p {
      margin: 0;
      color: rgba(255, 255, 255, .84);
      line-height: 1.55;
    }

    .info-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
    }

    .tile {
      min-height: 76px;
      padding: 11px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
    }

    .tile span {
      display: block;
      color: var(--muted);
      font-size: 12px;
    }

    .tile strong {
      display: block;
      margin-top: 5px;
      font-size: 17px;
      line-height: 1.15;
    }

    .note {
      margin: 0;
      color: var(--muted);
      line-height: 1.62;
      font-size: 14px;
    }

    .btn {
      min-height: 44px;
      padding: 0 14px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      color: var(--ink);
      background: #fff;
      font-weight: 800;
    }

    .btn.primary {
      color: #fff;
      border-color: transparent;
      background: linear-gradient(135deg, var(--brand), var(--brand-2));
    }

    .btn.full { width: 100%; }

    .chat {
      height: 100%;
      min-height: 0;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr) auto;
      overflow: hidden;
      background: var(--soft);
    }

    .progress-wrap {
      position: sticky;
      top: 0;
      z-index: 3;
      padding: 12px 15px 9px;
      border-bottom: 1px solid var(--line);
      background: rgba(255, 255, 255, .94);
      backdrop-filter: blur(12px);
    }

    .between {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .small { font-size: 12px; }
    .muted { color: var(--muted); }

    .progress {
      height: 7px;
      margin-top: 7px;
      overflow: hidden;
      border-radius: 999px;
      background: #dbe3ec;
    }

    .progress span {
      display: block;
      height: 100%;
      width: 0;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--brand), var(--brand-2));
      transition: width .25s;
    }

    .messages {
      min-height: 0;
      display: flex;
      flex-direction: column;
      gap: 11px;
      overflow-y: auto;
      overscroll-behavior: contain;
      padding: 12px 15px 18px;
    }

    .messages > * { flex-shrink: 0; }

    .bubble {
      max-width: 86%;
      padding: 11px 13px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
      box-shadow: 0 1px 2px rgba(15, 23, 42, .04);
      line-height: 1.5;
      white-space: pre-wrap;
    }

    .bubble.ai { align-self: flex-start; }
    .bubble.user {
      align-self: flex-end;
      color: #fff;
      border-color: var(--brand);
      background: var(--brand);
    }

    .bubble.system {
      align-self: center;
      max-width: 94%;
      color: var(--muted);
      border-color: #cbe1df;
      background: #eef7f5;
      font-size: 12px;
    }

    .composer {
      display: grid;
      gap: 8px;
      padding: 12px;
      border-top: 1px solid var(--line);
      background: rgba(255, 255, 255, .94);
      backdrop-filter: blur(12px);
    }

    .textarea {
      width: 100%;
      min-height: 48px;
      resize: none;
      padding: 11px 12px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      color: var(--ink);
      background: #fff;
      outline: 0;
      line-height: 1.45;
    }

    .textarea:focus {
      border-color: rgba(37, 99, 235, .55);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, .1);
    }

    .quick-options {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .chip {
      min-height: 32px;
      padding: 0 10px;
      border: 1px solid var(--line);
      border-radius: 999px;
      color: var(--ink);
      background: #fff;
      font-size: 13px;
    }

    .row {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .result-card {
      width: 100%;
      align-self: stretch;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
      box-shadow: 0 10px 30px rgba(15, 23, 42, .08);
    }

    .result-head {
      color: #fff;
      padding: 16px;
      background: linear-gradient(135deg, rgba(15, 118, 110, .98), rgba(37, 99, 235, .92));
    }

    .result-head h2 {
      margin: 7px 0 5px;
      font-size: 26px;
      line-height: 1.08;
      letter-spacing: 0;
    }

    .result-body {
      display: grid;
      gap: 14px;
      padding: 16px;
    }

    .score-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }

    .score {
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #f8fafc;
    }

    .meter {
      height: 6px;
      margin-top: 8px;
      overflow: hidden;
      border-radius: 999px;
      background: #dbe3ec;
    }

    .meter span {
      display: block;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--brand), var(--brand-2));
    }

    .actions {
      margin: 0;
      padding-left: 20px;
      color: var(--muted);
      line-height: 1.6;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: calc(18px + env(safe-area-inset-bottom));
      z-index: 20;
      max-width: calc(100vw - 32px);
      padding: 10px 14px;
      border-radius: var(--radius);
      color: #fff;
      background: #172033;
      box-shadow: var(--shadow);
      transform: translateX(-50%) translateY(calc(100% + 32px));
      opacity: 0;
      pointer-events: none;
      transition: transform .24s, opacity .24s;
    }

    .toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }

    [hidden] { display: none !important; }

    @media (max-width: 520px) {
      .app { padding: 0; place-items: stretch; }
      .shell {
        width: 100%;
        height: 100dvh;
        min-height: 0;
        border: 0;
        border-radius: 0;
        box-shadow: none;
      }
      .hero h1 { font-size: 32px; }
      .score-grid, .info-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="shell" aria-label="AI 互动调研与实时画像系统">
      <header class="head">
        <div class="mark">AI</div>
        <div>
          <strong id="eventName">AI 互动调研与实时画像系统</strong>
          <span>扫码调研 · 个人 AI 工作力画像</span>
        </div>
      </header>

      <section class="screen welcome" id="welcomeScreen">
        <div class="hero">
          <div class="eyebrow">Yanfeng Conference</div>
          <h1>生成你的 AI 工作力画像</h1>
          <p>用一段轻松对话了解你的 AI 使用现状、主要顾虑和下一步学习方向。</p>
        </div>
        <div class="info-grid">
          <div class="tile"><span>预计用时</span><strong>3-5 分钟</strong></div>
          <div class="tile"><span>参与方式</span><strong>匿名调研</strong></div>
          <div class="tile"><span>完成后</span><strong>即时画像</strong></div>
        </div>
        <p class="note">本调研仅用于现场汇总展示，不采集敏感个人信息。你可以用自然语言回答，也可以选择快捷选项。</p>
        <button class="btn primary full" id="startBtn">开始 AI 调研</button>
        <button class="btn primary full" id="viewResultBtn" hidden>查看我的结果</button>
        <button class="btn full" id="resetDemoBtn" hidden>复原调研</button>
      </section>

      <section class="chat" id="chatScreen" hidden>
        <div class="progress-wrap">
          <div class="between small muted">
            <span id="progressText">还剩 7 个问题</span>
            <span id="sessionId">匿名会话</span>
          </div>
          <div class="progress"><span id="progressBar"></span></div>
        </div>
        <div class="messages" id="messages"></div>
        <div class="composer" id="composer">
          <textarea class="textarea" id="answerInput" rows="2" placeholder="用自然语言回答，也可以点下方快捷选项"></textarea>
          <div class="quick-options" id="quickOptions"></div>
          <div class="between">
            <div class="row">
              <button class="btn" id="skipBtn">跳过</button>
              <button class="btn" id="voiceBtn">语音</button>
            </div>
            <button class="btn primary" id="sendBtn">发送</button>
          </div>
        </div>
      </section>
    </section>
  </main>
  <div class="toast" id="toast">已保存</div>

  <script>
    const STORE_KEY = "yanfeng-audience-h5-v2";
    const AUDIENCE_RESET_SIGNAL_KEY = "yanfeng-audience-reset-at";
    const API_BASE = (() => {
      const params = new URLSearchParams(location.search);
      const explicit = params.get("api") || window.YANFENG_API_BASE || localStorage.getItem("yanfeng-api-base") || "";
      if (explicit) {
        const normalized = explicit.replace(/\/$/, "");
        localStorage.setItem("yanfeng-api-base", normalized);
        return normalized;
      }
      if (location.protocol === "file:") return "http://127.0.0.1:8787/api";
      if (location.hostname.endsWith("github.io")) return "";
      return "/api";
    })();

    const defaults = {
      eventName: "AI 互动调研与实时画像系统",
      activityState: "进行中",
      prompt: "根据用户回答，输出画像类型、四项评分、100-150 字解读和 3 条行动建议。模型失败时使用模板兜底。",
      promptTemplates: {
        answerExtract: {
          version: "answer-extract-v2",
          content: [
            "你是企业大会现场的 Dashboard 单题结构化助手。",
            "请求中会提供 dashboardField，只提取该字段，其他统计字段必须返回未提及或空数组。",
            "只返回 JSON，不要 Markdown，不要解释。",
            "字段必须为：summary, usageFrequency, willingness, capabilityTags, wishTags, confidence。",
            "usageFrequency 从 从未使用、偶尔使用、每周使用、每天使用、未提及 中选择。",
            "willingness 只能从 期待、观望、担心、未提及 中选择：愿意尝试、主动采用归为期待；暂不确定、先看看、暂不感兴趣归为观望；担忧风险、存在顾虑归为担心。",
            "capabilityTags 表示用户认为 AI 已经能做到什么；wishTags 表示用户希望 AI 做到什么。",
            "summary 必须只依据用户回答本身，不得把问题文本中的示例、选项或工具名当作用户已经提到的内容。",
            "如果用户回答中出现具体 AI 工具名，summary 和 tags 中必须原样保留用户写法，不要自行替换、纠错或补充。",
            "例如用户回答“用过 Gemini”或“用过 Gimini”，不得写成“用过 Kimi”，也不得补充 ChatGPT、通义、豆包等用户没有提到的工具。",
            "如果用户只回答“用过”“试过”“每天”等泛化内容，但没有写具体工具名，不要在 summary 中添加任何具体工具名。",
            "每个 tags 数组最多 4 个短词。confidence 为 0-1 数字。"
          ].join("\n")
        },
        routeDecision: {
          version: "route-decision-v1",
          content: [
            "你是问卷智能路由助手。",
            "请根据用户的自然语言回答，从 allowedRoutes 中选择语义最匹配的下一题。",
            "关键词只是辅助提示，不要求用户逐字命中。不得选择 allowedRoutes 之外的题目。",
            "如果信息不足或无法判断，选择 defaultNext。",
            "只返回 JSON，不要 Markdown，不要解释。字段必须为：nextQuestionId, confidence, reason。"
          ].join("\n")
        },
        profileGenerate: {
          version: "profile-generate-v1",
          content: [
            "根据用户回答和单题结构化总结，输出画像类型、四项评分、100-150 字解读和 3 条行动建议。",
            "画像文本必须严格依据用户真实回答，不得把题目中的示例工具名当作用户使用过的工具。",
            "如果用户提到具体 AI 工具名，必须原样保留用户写法，不要自行替换、纠错或补充。",
            "例如用户回答“用过 Gemini”或“用过 Gimini”，画像中不得写成“用过 Kimi”，也不得写“如 Kimi”。",
            "如果用户没有提到具体工具名，不要在画像文本中出现 ChatGPT、通义、Kimi、豆包、Gemini 等具体工具名。"
          ].join("\n")
        },
        groupInsight: { version: "group-insight-v1", content: "请基于现场聚合数据生成一段适合大屏展示的全场洞察。" }
      },
      questions: [
    {
      id: "q1_usage_base",
      title: "第 1 题：使用基础判断",
      route: "通用入口",
      text: "你平时会使用 AI 工具吗？如果用过，请说说大概多久使用一次；如果没用过，直接回答“没用过”即可。",
      helper: "",
      quick: ["没用过", "只试过几次", "偶尔使用", "经常使用", "每天使用"],
      aiRouteEnabled: true,
      nextRules: [
        { keywords: ["没用过", "从未使用", "从来没用", "没有用过", "没试过", "听说过但没试过", "不了解", "不会用", "否"], next: "q2_newbie_distance" },
        { keywords: ["不经常", "很少", "偶尔", "有时", "有时候", "试过", "几次", "每周", "需要时", "不熟"], next: "q2_intro_frequency" },
        { keywords: ["每天", "天天", "经常", "频繁", "常用", "高频", "工作中常用", "已形成习惯", "离不开"], next: "q2_advanced_frequency" },
        { keywords: ["用过", "使用过", "是"], next: "q2_intro_frequency" }
      ],
      defaultNext: "q2_intro_frequency"
    },
    {
      id: "q2_newbie_distance",
      title: "第 2 题：认知距离",
      route: "新手路线",
      text: "你觉得 AI 离你的日常工作近吗？",
      helper: "可以简单说说你觉得它有用、暂时用不上、还不了解，或有点担心。",
      quick: ["感觉有用", "暂时用不上", "还不了解", "有点担心"],
      defaultNext: "q3_impact"
    },
    {
      id: "q2_intro_frequency",
      title: "第 2 题：使用触发场景",
      route: "入门路线",
      text: "你通常会在什么情况下想到使用 AI？可以说一个最近使用的场景；如果还没有固定场景，也可以直接说。",
      helper: "",
      quick: ["写文档或邮件时", "查资料或做总结时", "遇到不懂的问题时", "工作忙、需要提效时", "还没有固定场景"],
      defaultNext: "q3_impact"
    },
    {
      id: "q2_advanced_frequency",
      title: "第 2 题：使用方式成熟度",
      route: "进阶路线",
      text: "你现在通常怎样把 AI 用进工作？可以说是临时问答、固定提示词、固定工作场景，还是已经接入工作流程。",
      helper: "",
      quick: ["临时问答", "固定提示词模板", "固定工作场景", "结合知识资料", "接入工作流程"],
      defaultNext: "q3_advanced_work"
    },
    {
      id: "q3_impact",
      title: "第 3 题：AI 能力认知",
      route: "新手/入门路线",
      text: "结合你的了解或体验，你觉得 AI 现在能帮人完成哪些工作？可以直接说你想到的事情。",
      helper: "",
      quick: ["写文档和邮件", "查资料和做总结", "整理会议纪要", "分析数据", "还不太清楚"],
      defaultNext: "q4_scene"
    },
    {
      id: "q3_advanced_work",
      title: "第 3 题：高频工作场景",
      route: "进阶路线",
      text: "你目前最常用 AI 做哪些工作？",
      helper: "可以说具体任务，例如写材料、做总结、查资料、分析数据、生成方案等。",
      quick: ["写文档", "做总结", "查资料", "分析数据", "生成方案"],
      defaultNext: "q4_advanced_best"
    },
    {
      id: "q4_scene",
      title: "第 4 题：工作场景挖掘",
      route: "新手/入门路线",
      text: "你最希望 AI 帮你解决哪类工作问题？",
      helper: "例如写文档、做总结、查资料、整理数据、生成方案、做会议纪要、处理邮件、做报表、辅助决策等。",
      quick: ["文档/方案/邮件", "数据/报表/分析", "会议/纪要/待办", "查资料/知识库", "还不确定"],
      aiRouteEnabled: true,
      nextRules: [
        { keywords: ["文档", "方案", "邮件", "汇报", "材料"], next: "q5_doc" },
        { keywords: ["数据", "报表", "分析", "图表"], next: "q5_data" },
        { keywords: ["会议", "纪要", "待办", "会后"], next: "q5_meeting" },
        { keywords: ["查资料", "知识库", "制度", "流程", "检索"], next: "q5_knowledge" },
        { keywords: ["不知道", "不确定", "没场景", "重复", "耗时"], next: "q5_repetitive" }
      ],
      defaultNext: "q5_repetitive"
    },
    {
      id: "q4_advanced_best",
      title: "第 4 题：高价值场景",
      route: "进阶路线",
      text: "哪一个 AI 使用场景对你帮助最大？",
      helper: "可以描述一个具体场景，以及它帮你节省了什么时间或改善了什么质量。",
      quick: ["文档写作", "会议总结", "数据分析", "知识检索", "流程提效"],
      defaultNext: "q5_advanced_flow"
    },
    {
      id: "q5_doc",
      title: "第 5 题：文档类追问",

    const $ = id => document.getElementById(id);
    const clone = value => JSON.parse(JSON.stringify(value));
    const MAX_SURVEY_QUESTIONS = 8;

    function normalizeQuestion(item = {}, index = 0) {
      const source = typeof item === "string" ? { text: item } : (item || {});
      const fallback = defaults.questions[index] || {};
      const nextRules = Array.isArray(source.nextRules) ? source.nextRules.map(rule => ({
        keywords: Array.isArray(rule.keywords) ? rule.keywords.map(item => String(item).trim()).filter(Boolean) : [],
        next: String(rule.next || "").trim()
      })).filter(rule => rule.next) : (Array.isArray(fallback.nextRules) ? clone(fallback.nextRules) : []);
      const routeFlag = Object.prototype.hasOwnProperty.call(source, "aiRouteEnabled")
        ? !!source.aiRouteEnabled
        : (Object.prototype.hasOwnProperty.call(source, "aiExtractEnabled") ? !!source.aiExtractEnabled : !!fallback.aiRouteEnabled);
      return {
        id: String(source.id || fallback.id || `q${index + 1}`).trim(),
        title: String(source.title || fallback.title || `第 ${index + 1} 题`).trim(),
        route: String(source.route || fallback.route || "通用").trim(),
        text: String(source.text || fallback.text || "").trim(),
        helper: Object.prototype.hasOwnProperty.call(source, "helper") ? String(source.helper || "").trim() : "",
        quick: Array.isArray(source.quick) ? source.quick.map(item => String(item).trim()).filter(Boolean) : (Array.isArray(fallback.quick) ? fallback.quick : []),
        aiRouteEnabled: nextRules.length ? routeFlag : false,
        nextRules,
        defaultNext: Object.prototype.hasOwnProperty.call(source, "defaultNext")
          ? String(source.defaultNext || "").trim()
          : String(fallback.defaultNext || "").trim()
      };
    }

    function normalizeQuestions(input) {
      const list = Array.isArray(input) && input.length ? input : defaults.questions;
      return list.map((item, index) => normalizeQuestion(item, index)).filter(item => item.text);
    }

    function questionIndexById(id, questions = state.questions) {
      const target = String(id || "");
      return normalizeQuestions(questions).findIndex(item => item.id === target);
    }

    function questionMessage(question) {
      return String(question && question.text ? question.text : "");
    }

    let state = loadState();
    state.questions = normalizeQuestions(state.questions);
    if (state.eventName && state.eventName.indexOf("延锋大会") >= 0) state.eventName = defaults.eventName;
    let submittedThisSession = false;
    let answerSubmitting = false;
    let awaitingProfileGeneration = false;
    let resultAnchor = null;
    let recognition = null;

    function loadState() {
      try {
        const saved = JSON.parse(localStorage.getItem(STORE_KEY) || "null");
        if (!saved) return clone(defaults);
        return {
          ...clone(defaults),
          ...saved,
          promptTemplates: {
            ...clone(defaults.promptTemplates),
            ...(saved.promptTemplates || {})
          },
          questions: normalizeQuestions(saved.questions)
        };
      } catch (error) {
        return clone(defaults);
      }
    }

    function saveState() {
      localStorage.setItem(STORE_KEY, JSON.stringify(state));
    }

    async function apiRequest(path, options = {}) {
      if (!API_BASE) throw new Error("API backend is not configured");
      const response = await fetch(`${API_BASE}${path}`, {
        method: options.method || "GET",
        headers: { "Content-Type": "application/json" },
        body: options.body ? JSON.stringify(options.body) : undefined
      });
      if (!response.ok) throw new Error(await response.text().catch(() => "API error"));
      return response.json();
    }

    async function pullConfig() {
      try {
        const remote = await apiRequest("/state");
        if (remote && typeof remote === "object") {
          state.eventName = remote.eventName || state.eventName;
          state.activityState = remote.activityState || state.activityState;
          state.prompt = remote.prompt || state.prompt;
          state.promptTemplates = remote.promptTemplates || state.promptTemplates || defaults.promptTemplates;
          if (state.promptTemplates && state.promptTemplates.profileGenerate && state.promptTemplates.profileGenerate.content) {
            state.prompt = state.promptTemplates.profileGenerate.content;
          }
          state.questions = normalizeQuestions(remote.questions || state.questions);
          saveState();
          renderEntry();
        }
      } catch (error) {
        renderEntry();
      }
    }

    async function recordSessionStart(session) {

    function resetDemo(options = false) {
      const silent = options === true || (options && options.silent === true);

    function updateProgress() {
      const total = MAX_SURVEY_QUESTIONS;
      const answered = state.currentSession && Array.isArray(state.currentSession.answers) ? state.currentSession.answers.length : 0;
      const current = Math.min(answered, total);
      const activeQuestion = state.currentSession ? getActiveQuestion() : null;
      const left = activeQuestion ? Math.max(total - current, 0) : 0;
      $("progressText").textContent = left > 0 ? `还剩 ${left} 个问题` : "调研完成";
      $("progressBar").style.width = `${Math.min((current / Math.max(total, 1)) * 100, 100)}%`;
    }

    function renderQuickOptions() {
      const question = getActiveQuestion();
      if (submittedThisSession || awaitingProfileGeneration || !question) {
        $("quickOptions").innerHTML = "";
        return;
      }
      const options = question.quick || [];
      $("quickOptions").innerHTML = options.map(option => `<button class="chip" type="button" data-answer="${option}">${option}</button>`).join("");
      $("quickOptions").querySelectorAll("[data-answer]").forEach(btn => {
        btn.addEventListener("click", () => {
          if (answerSubmitting || submittedThisSession || awaitingProfileGeneration) return;
          $("answerInput").value = btn.dataset.answer;
          sendAnswer(false);
        });
      });
    }

    function getActiveQuestion() {
      if (!state.currentSession) return null;
      const questions = normalizeQuestions(state.questions);
      const index = Number(state.currentSession.currentQuestion) || 0;
      if (index < 0 || index >= questions.length) return null;
      if ((state.currentSession.answers || []).length >= MAX_SURVEY_QUESTIONS) return null;
      return questions[index] || null;
    }

    function normalizeRuleText(value) {
      return String(value || "").toLowerCase().replace(/\s+/g, "");
    }

    function answerMatchesRule(answer, rule) {
      const source = normalizeRuleText(answer);
      return (rule.keywords || []).some(keyword => {
        const target = normalizeRuleText(keyword);
        return target && source.includes(target);
      });
    }

    function resolveNextQuestionIndex(question, answer, currentIndex, routeDecision = null) {
      const questions = normalizeQuestions(state.questions);
      if (!question || (state.currentSession.answers || []).length >= MAX_SURVEY_QUESTIONS) return questions.length;
      const aiNextId = routeDecision && routeDecision.nextQuestionId ? String(routeDecision.nextQuestionId) : "";
      const allowedRouteIds = new Set([...(question.nextRules || []).map(rule => rule.next), question.defaultNext].filter(Boolean));
      if (aiNextId && allowedRouteIds.has(aiNextId)) {
        if (aiNextId === "__end__") return questions.length;
        const aiIndex = questionIndexById(aiNextId, questions);
        if (aiIndex >= 0) return aiIndex;
      }
      const matchedRule = (question.nextRules || []).find(rule => answerMatchesRule(answer, rule));
      const nextId = matchedRule ? matchedRule.next : question.defaultNext;
      if (nextId === "__end__") return questions.length;
      const explicitIndex = questionIndexById(nextId, questions);
      if (explicitIndex >= 0) return explicitIndex;
      return currentIndex + 1;
    }

    function askNext() {
      updateProgress();
      renderQuickOptions();
      const current = state.currentSession.currentQuestion;
      const question = getActiveQuestion();
      if (!question) {
        if (awaitingProfileGeneration || submittedThisSession) return;
        awaitingProfileGeneration = true;
        state.currentSession.status = "等待生成画像";
        $("composer").hidden = true;
        setAnswerControlsDisabled(true);
        document.querySelectorAll(".generate-profile-btn").forEach(btn => {
          if (btn.parentNode) btn.parentNode.removeChild(btn);
        });
        setTimeout(() => {
          if (submittedThisSession || !awaitingProfileGeneration || resultAnchor) return;
          resultAnchor = addMessage("ai", "感谢你的回答。我已经整理好关键线索，现在可以生成你的 AI 画像。");
        }, 240);
        setTimeout(() => {
          if (submittedThisSession || !awaitingProfileGeneration || document.querySelector(".generate-profile-btn")) return;
          const btn = document.createElement("button");
          btn.className = "btn primary full generate-profile-btn";
          btn.textContent = "生成我的 AI 画像";
          btn.addEventListener("click", event => generateProfile(event));
          $("messages").appendChild(btn);
          $("messages").scrollTop = $("messages").scrollHeight;
        }, 560);
        saveState();
        return;
      }
      setTimeout(() => {
        if (submittedThisSession || awaitingProfileGeneration) return;
        addMessage("ai", questionMessage(question));
      }, 240);
    }
    function startChat() {
      if (ownSubmission()) {
        renderProfileResult(ownSubmission(), false);
        return;
      }
      if (state.activityState !== "进行中") {
        showToast(state.activityState === "未开始" ? "本场调研尚未开始" : "本场调研已结束，感谢参与");
        return;
      }
      state.currentSession = {
        sessionId: `S-${Math.floor(1000 + Math.random() * 9000)}`,
        enterTime: new Date().toISOString(),
        currentQuestion: 0,
        answers: [],
        answerInsights: [],
        status: "进行中"
      };
      submittedThisSession = false;
      answerSubmitting = false;
      awaitingProfileGeneration = false;
      $("welcomeScreen").hidden = true;
      $("chatScreen").hidden = false;
      $("composer").hidden = false;
      setAnswerControlsDisabled(false);
      resetMessages();
      $("sessionId").textContent = state.currentSession.sessionId;
      addMessage("ai", "你好，我是本场 AI 调研助手。接下来我会用几个简短问题了解你的 AI 使用现状，答案不会采集实名信息。");
      askNext();
      saveState();
      recordSessionStart(state.currentSession);
    }

    async function sendAnswer(skip = false) {
      if (!state.currentSession || submittedThisSession || answerSubmitting || awaitingProfileGeneration) return;
      const input = $("answerInput");
      const activeQuestion = getActiveQuestion();
      if (!activeQuestion) {
        askNext();
        return;
      }
      const text = skip ? "跳过这个问题" : input.value.trim();
      if (!text) {
        showToast("先写一句回答，或点击跳过");
        return;
      }
      answerSubmitting = true;
      setAnswerControlsDisabled(true);
      const questionIndex = state.currentSession.currentQuestion;
      const questionObj = activeQuestion;
      const question = questionObj.text || "";
      addMessage("user", text);
      state.currentSession.answers.push({
        questionIndex,
        questionId: questionObj.id,
        questionTitle: questionObj.title,
        question,
        answer: text,
        skipped: skip
      });
      input.value = "";
      let routeDecision = null;
      if (!skip && text.length <= 5) {
        setTimeout(() => {
          if (submittedThisSession || awaitingProfileGeneration) return;
          addMessage("ai", "收到。我会记录这条回答，后面会结合其它问题一起生成画像。");
        }, 160);
      }
      try {
        const result = await apiRequest("/answers", {
          method: "POST",
          body: {
            sessionId: state.currentSession.sessionId,
            questionIndex,
            questionId: questionObj.id,
            questionTitle: questionObj.title,
            question,
            answer: text,
            skipped: skip
          }
        });
        if (result && result.answerInsight) {
          if (!Array.isArray(state.currentSession.answerInsights)) state.currentSession.answerInsights = [];
          state.currentSession.answerInsights = state.currentSession.answerInsights.filter(item => Number(item.questionIndex) !== Number(questionIndex));
          state.currentSession.answerInsights.push({ questionIndex, question, answer: text, ...result.answerInsight });
        }
        if (result && result.routeDecision) routeDecision = result.routeDecision;
      } catch (error) {
      } finally {
        if (state.currentSession && Number(state.currentSession.currentQuestion) === Number(questionIndex)) {
          state.currentSession.currentQuestion = resolveNextQuestionIndex(questionObj, text, questionIndex, routeDecision);
        }
        answerSubmitting = false;
        askNext();
        if (!submittedThisSession && !awaitingProfileGeneration) setAnswerControlsDisabled(false);
        saveState();
      }
    }

    function startVoice() {
      if (answerSubmitting || submittedThisSession || awaitingProfileGeneration) return;
      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (!SpeechRecognition) {
        showToast("当前浏览器未开放语音转文字，可使用手机键盘语音输入");
        return;

      recognition = recognition || new SpeechRecognition();
      recognition.lang = "zh-CN";
      recognition.interimResults = false;
      recognition.onresult = event => {
        $("answerInput").value = event.results[0][0].transcript;

      };
      recognition.onerror = () => showToast("语音识别失败，请改用文字输入");
      recognition.start();
      showToast("正在聆听，请说出你的回答");
    }

    function textOfAnswers() {
      return (state.currentSession && state.currentSession.answers ? state.currentSession.answers : []).map(item => item.answer).join(" ");
    }

    function includesAny(text, words) {
      const source = String(text || "");
      for (let i = 0; i < words.length; i += 1) {
        if (source.indexOf(words[i]) >= 0) return true;
      }
      return false;
    }

    function inferProfile() {
      const text = textOfAnswers();
      if (includesAny(text, ["推动", "培训", "分享", "团队", "推广"])) return "AI 推动者";
      if (includesAny(text, ["每天", "经常", "流程", "自动", "知识库", "研发", "数据分析"])) return "AI 场景实践者";
      if (includesAny(text, ["用过", "报告", "会议", "总结", "文档", "效率", "每周"])) return "AI 效率提升者";
      if (includesAny(text, ["偶尔", "试过", "豆包", "Kimi", "通义", "ChatGPT", "Gemini", "Gimini"])) return "AI 尝鲜者";
      return "AI 旁观者";
    }

    function inferScenario(text) {
      const candidates = [
        ["会议纪要", ["会议", "纪要"]],
        ["文档/报告", ["文档", "报告", "邮件", "初稿"]],
        ["数据分析", ["数据", "分析", "报表"]],
        ["知识检索", ["检索", "搜索", "资料", "知识库"]],
        ["研发/营销", ["研发", "营销", "客服", "代码"]]
      ];
      for (let i = 0; i < candidates.length; i += 1) {
        if (includesAny(text, candidates[i][1])) return candidates[i][0];
      }
      return "培训入门";
    }

    function inferConcern(text) {
      const candidates = [
        ["准确性", ["准确", "可靠", "错误", "幻觉"]],
        ["数据安全", ["安全", "隐私", "敏感", "保密"]],
        ["不会提问", ["不会", "提示词", "提问", "怎么问"]],
        ["工具限制", ["限制", "权限", "打不开", "账号"]],
        ["缺少案例", ["案例", "不知道", "不清楚"]]
      ];
      for (let i = 0; i < candidates.length; i += 1) {
        if (includesAny(text, candidates[i][1])) return candidates[i][0];
      }
      return "缺少案例";
    }

        },
        "AI 场景实践者": {
          text: "你已经能把 AI 与具体业务问题联系起来，关注的不只是工具本身，而是如何把它嵌入稳定流程。接下来适合学习任务拆解、知识库和结果校验，让 AI 从个人效率工具升级为协作能力。",
          scores: [86, 82, 88, 84],
          actions: ["把重复任务拆成可交给 AI 协作的步骤。", "尝试建立私有知识素材与提示词组合。", "为关键输出设置人工复核和事实校验点。"]
        },
        "AI 效率提升者": {
          text: "你已经意识到 AI 可以帮助提升工作效率，并可能在资料整理、内容生成、信息检索等场景中有所尝试。你目前最需要的是把零散使用沉淀为固定场景、提示词模板和可靠的输出校验方法。",
          scores: [76, 68, 72, 78],
          actions: ["把 AI 用于会议纪要、报告初稿、资料总结等高频任务。", "学习如何写出清晰提示词，并沉淀可复用模板。", "建立输出校验习惯，区分可直接使用和需要复核的结果。"]
        },
        "AI 尝鲜者": {
          text: "你对 AI 有兴趣，也可能已经试用过一些工具，但还没有形成稳定习惯。建议从低风险、高频率的日常任务开始，例如会议纪要、资料摘要和邮件初稿，先建立可感知的小胜利。",
          scores: [62, 48, 55, 66],
          actions: ["选择一个不涉及敏感信息的日常任务开始。", "用课程中的模板完成一次完整提示词练习。", "每周固定复盘一次 AI 输出是否真的节省时间。"]
        },
        "AI 旁观者": {
          text: "你对 AI 的价值仍在观察，可能担心准确性、数据安全或不知道如何开始。建议先从课程中的基础案例入手，用不涉及敏感信息的任务体验 AI，再逐步理解提示词和校验方法。",
          scores: [42, 28, 36, 48],
          actions: ["先理解 AI 能做什么和不能做什么。", "从资料摘要、改写润色等低风险任务体验。", "重点学习数据安全边界和结果校验方法。"]
        }
      };
      return map[type] || map["AI 旁观者"];
    }

    function contentForSubmission(submission) {
      const base = profileContent(submission.profileType);
      return {
        text: submission.profileText || base.text,
        scores: Array.isArray(submission.scores) && submission.scores.length === 4 ? submission.scores : base.scores,
        actions: Array.isArray(submission.actions) && submission.actions.length ? submission.actions : base.actions
      };
    }

    function extractKeywords(text) {
      const dict = ["ChatGPT", "通义", "Kimi", "豆包", "Gemini", "Gimini", "会议纪要", "提示词", "数据安全", "报告初稿", "准确性", "知识库", "效率提升", "流程嵌入", "不会提问", "数据分析", "培训入门", "结果校验"];
      const found = dict.filter(word => text.includes(word.replace("/", "")) || text.includes(word));
      return found.length ? found : ["会议纪要", "提示词", "准确性"];
    }

    function removeGeneratedButton(trigger) {
      document.querySelectorAll(".generate-profile-btn").forEach(btn => {
        if (btn !== trigger && btn.parentNode) btn.parentNode.removeChild(btn);
      });
    }

    async function generateProfile(event = null) {
      if (!state.currentSession || submittedThisSession) {
        showToast("本次会话已提交，已防止重复提交");
        return;
      }
      const trigger = event && event.currentTarget ? event.currentTarget : document.querySelector(".generate-profile-btn");
      submittedThisSession = true;
      awaitingProfileGeneration = false;
      answerSubmitting = false;
      $("composer").hidden = true;
      setAnswerControlsDisabled(true);
      removeGeneratedButton(trigger);
      if (trigger) {
        trigger.disabled = true;
        trigger.textContent = "正在生成你的 AI 工作力画像...";
      }

      try {
        const result = await apiRequest("/sessions/complete", {
          method: "POST",
          body: {
            sessionId: state.currentSession.sessionId,
            enterTime: state.currentSession.enterTime,
            answers: state.currentSession.answers,
            answerInsights: state.currentSession.answerInsights || []
          }
        });
        const submission = result && result.submission ? result.submission : null;
        if (!submission) throw new Error("No submission returned");
        state.currentSession.status = "已完成";
        state.lastSubmission = submission;
        renderProfileResult(submission, true, trigger);
        saveState();
        renderEntry();
        return;
      } catch (error) {
        if (API_BASE) showToast("AI 生成失败，已使用本地规则兜底");
      }

      const text = textOfAnswers();
      let aiProfile = null;
      const profileType = aiProfile && aiProfile.profileType ? aiProfile.profileType : inferProfile();
      const base = profileContent(profileType);
      const submission = {
        sessionId: state.currentSession.sessionId,
        eventId: "yanfeng-demo-2026",
        enterTime: state.currentSession.enterTime,
        submitTime: new Date().toISOString(),
        answers: state.currentSession.answers,
        derivedTags: aiProfile && Array.isArray(aiProfile.derivedTags) ? aiProfile.derivedTags : extractKeywords(text),
        profileType,
        profileText: aiProfile && aiProfile.profileText ? aiProfile.profileText : base.text,
        scores: aiProfile && Array.isArray(aiProfile.scores) ? aiProfile.scores : base.scores,
        actions: aiProfile && Array.isArray(aiProfile.actions) ? aiProfile.actions : base.actions,
        scenario: aiProfile && aiProfile.scenario ? aiProfile.scenario : inferScenario(text),
        concern: aiProfile && aiProfile.concern ? aiProfile.concern : inferConcern(text),
        aiGenerated: !!(aiProfile && aiProfile.aiGenerated),
        aiModel: aiProfile && aiProfile.model ? aiProfile.model : "local-fallback",
        status: "已完成"
      };

      state.currentSession.status = "已完成";
      state.lastSubmission = submission;
      renderProfileResult(submission, true, trigger);
      saveState();
      renderEntry();
      submitToBackend(submission);
    }

    function renderResultCard(submission) {
      const content = contentForSubmission(submission);
      const labels = ["AI 认知度", "使用成熟度", "场景清晰度", "行动意愿"];
      const card = document.createElement("div");
      card.className = "result-card";
      card.innerHTML = `
        <div class="result-head">
          <div class="eyebrow">AI Generated Profile</div>
          <h2>${submission.profileType}</h2>
          <div>${submission.scenario || "场景待识别"} · ${submission.concern || "顾虑待识别"}</div>
        </div>
        <div class="result-body">
          <p class="muted" style="margin:0;">${content.text}</p>
          <div class="score-grid">
            ${labels.map((label, index) => `
              <div class="score">
                <div class="between small"><span class="muted">${label}</span><strong>${content.scores[index]}</strong></div>
                <div class="meter"><span style="width:${content.scores[index]}%"></span></div>
              </div>
            `).join("")}
          </div>
          <div>
            <strong>建议优先学习</strong>
            <ol class="actions">${content.actions.map(item => `<li>${item}</li>`).join("")}</ol>
          </div>
        </div>
      `;
      return card;
    }

    function renderProfileResult(submission, preserveMessages = false, mountNode = null) {
      $("welcomeScreen").hidden = true;
      $("chatScreen").hidden = false;
      $("composer").hidden = true;
      $("sessionId").textContent = submission.sessionId || "匿名会话";
      $("progressText").textContent = "已生成 AI 画像";
      $("progressBar").style.width = "100%";

      if (!preserveMessages) {
        resetMessages();
        addMessage("system", "以下是你本次调研的问答记录和 AI 画像结果。");
        (submission.answers || []).forEach(item => {
          if (typeof item === "string") {
            addMessage("user", item);
          } else {
            if (item.question) addMessage("ai", item.question);
            addMessage("user", item.answer || "");
          }
        });
      }

      const card = renderResultCard(submission);
      const resetBtn = document.createElement("button");
      resetBtn.className = "btn full reset-demo-inline";
      resetBtn.textContent = "复原调研，重新演示";
      resetBtn.addEventListener("click", resetDemo);
      if (mountNode && mountNode.parentNode) {
        mountNode.parentNode.replaceChild(card, mountNode);
      } else {
        const anchor = resultAnchor && resultAnchor.parentNode === $("messages") ? resultAnchor : null;
        if (anchor && anchor.nextSibling) $("messages").insertBefore(card, anchor.nextSibling);
        else $("messages").appendChild(card);
      }
      $("messages").appendChild(resetBtn);
      setTimeout(() => {
        $("messages").scrollTop = Math.max(card.offsetTop - 18, 0);
      }, 60);
    }

    $("startBtn").addEventListener("click", startChat);
    $("viewResultBtn").addEventListener("click", () => renderProfileResult(ownSubmission(), false));
    $("resetDemoBtn").addEventListener("click", resetDemo);
    $("sendBtn").addEventListener("click", () => sendAnswer(false));
    $("skipBtn").addEventListener("click", () => sendAnswer(true));
    $("voiceBtn").addEventListener("click", startVoice);
    window.addEventListener("storage", event => {
      if (event.key === AUDIENCE_RESET_SIGNAL_KEY) resetDemo(true);
    });
    $("answerInput").addEventListener("keydown", event => {
      if (event.key === "Enter" && !event.shiftKey) {
        event.preventDefault();
        sendAnswer(false);
      }
    });

    renderEntry();
    pullConfig();
  </script>
</body>
</html>
